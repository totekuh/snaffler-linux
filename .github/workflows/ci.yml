name: snaffler-ng CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run tests
        run: |
          pytest

      - name: Build package
        run: |
          python -m pip install build
          python -m build

      - name: Upload dist
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-binary:
    needs: test-build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name snaffler-linux-x86_64 \
            --exclude-module matplotlib \
            --exclude-module PyQt5 \
            --exclude-module PyQt6 \
            --exclude-module PySide6 \
            --exclude-module tkinter \
            --exclude-module _tkinter \
            --exclude-module PIL \
            --exclude-module numpy \
            --exclude-module pygame \
            --exclude-module IPython \
            --exclude-module pytest \
            --exclude-module jedi \
            --exclude-module astroid \
            --exclude-module impacket.examples.ntlmrelayx \
            --exclude-module impacket.examples.mssqlshell \
            --exclude-module impacket.examples.ldap_shell \
            --exclude-module impacket.mqtt \
            --exclude-module impacket.Dot11Crypto \
            --exclude-module impacket.Dot11KeyManager \
            snaffler/cli/main.py

      - name: Smoke test
        run: ./dist/snaffler-linux-x86_64 --version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: dist/snaffler-linux-x86_64

  build-binary-arm64:
    needs: test-build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name snaffler-linux-aarch64 \
            --exclude-module matplotlib \
            --exclude-module PyQt5 \
            --exclude-module PyQt6 \
            --exclude-module PySide6 \
            --exclude-module tkinter \
            --exclude-module _tkinter \
            --exclude-module PIL \
            --exclude-module numpy \
            --exclude-module pygame \
            --exclude-module IPython \
            --exclude-module pytest \
            --exclude-module jedi \
            --exclude-module astroid \
            --exclude-module impacket.examples.ntlmrelayx \
            --exclude-module impacket.examples.mssqlshell \
            --exclude-module impacket.examples.ldap_shell \
            --exclude-module impacket.mqtt \
            --exclude-module impacket.Dot11Crypto \
            --exclude-module impacket.Dot11KeyManager \
            snaffler/cli/main.py

      - name: Smoke test
        run: ./dist/snaffler-linux-aarch64 --version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-arm64
          path: dist/snaffler-linux-aarch64

  build-binary-windows:
    needs: test-build
    if: github.ref == 'refs/heads/master'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name snaffler-windows-x86_64 `
            --exclude-module matplotlib `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --exclude-module PySide6 `
            --exclude-module tkinter `
            --exclude-module _tkinter `
            --exclude-module PIL `
            --exclude-module numpy `
            --exclude-module pygame `
            --exclude-module IPython `
            --exclude-module pytest `
            --exclude-module jedi `
            --exclude-module astroid `
            --exclude-module impacket.examples.ntlmrelayx `
            --exclude-module impacket.examples.mssqlshell `
            --exclude-module impacket.examples.ldap_shell `
            --exclude-module impacket.mqtt `
            --exclude-module impacket.Dot11Crypto `
            --exclude-module impacket.Dot11KeyManager `
            snaffler/cli/main.py

      - name: Smoke test
        run: .\dist\snaffler-windows-x86_64.exe --version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows
          path: dist/snaffler-windows-x86_64.exe

  build-deb:
    needs: test-build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-python \
            pybuild-plugin-pyproject python3-all python3-setuptools \
            python3-cryptography python3-rich
          # These may not be in ubuntu repos; install via pip as fallback
          sudo apt-get install -y python3-impacket python3-typer python3-tomlkit 2>/dev/null || \
            pip install impacket typer tomlkit

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b -d
          cp ../snaffler-ng_*.deb .

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: snaffler-ng_*.deb

  release:
    needs: [test-build, build-binary, build-binary-arm64, build-binary-windows, build-deb]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: binary/

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-arm64
          path: binary-arm64/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows
          path: binary-windows/

      - name: Download deb
        uses: actions/download-artifact@v4
        with:
          name: deb
          path: deb/

      - name: Publish to PyPI
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Get version
        id: version
        run: echo "version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksums
        run: |
          sha256sum binary/snaffler-linux-x86_64 \
                    binary-arm64/snaffler-linux-aarch64 \
                    binary-windows/snaffler-windows-x86_64.exe \
                    deb/*.deb \
                    dist/*.tar.gz \
                    dist/*.whl \
            | sed 's|  .*/|  |' > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*
            binary/snaffler-linux-x86_64
            binary-arm64/snaffler-linux-aarch64
            binary-windows/snaffler-windows-x86_64.exe
            deb/*.deb
            SHA256SUMS.txt
